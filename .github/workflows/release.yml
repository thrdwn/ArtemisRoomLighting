name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build installer
        shell: powershell
        run: .\work\RoomLighting.Installer\Build-Installer.ps1
      - name: Prepare release notes
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $changelog = Get-Content .\CHANGELOG.md -Raw
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^##\s+$escaped\s*\r?\n(?<body>.*?)(?=^##\s+|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
            $body = $match.Groups["body"].Value.Trim()
          } else {
            $body = "See the changelog for details."
          }

          $notes = @(
            "## What's changed",
            "",
            $body,
            "",
            "## Install",
            "",
            "Download ``ArtemisRoomLightingSetup-$version.exe`` from the assets below and run it."
          ) -join "`r`n"
          $notes | Set-Content -LiteralPath .\release-notes.md -Encoding UTF8
      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" .\outputs\ArtemisRoomLightingSetup-*.exe --notes-file .\release-notes.md --title "${{ github.ref_name }}"
