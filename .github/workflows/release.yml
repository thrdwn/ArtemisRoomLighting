name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build installer
        shell: powershell
        run: .\work\RoomLighting.Installer\Build-Installer.ps1
      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" .\outputs\ArtemisRoomLightingSetup-*.exe --generate-notes --title "${{ github.ref_name }}"
