name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build installer
        shell: powershell
        run: .\work\RoomLighting.Installer\Build-Installer.ps1
      - name: Test MVP logic
        shell: powershell
        run: dotnet run --project .\work\DirectDevicesLogicTest\DirectDevicesLogicTest.csproj -c Release
      - name: Verify embedded payload
        shell: powershell
        run: |
          $process = Start-Process .\outputs\ArtemisRoomLightingSetup-0.13.0.0.exe -ArgumentList "--verify-payload" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Payload verification failed." }
      - uses: actions/upload-artifact@v4
        with:
          name: ArtemisRoomLightingSetup
          path: outputs/ArtemisRoomLightingSetup-*.exe
